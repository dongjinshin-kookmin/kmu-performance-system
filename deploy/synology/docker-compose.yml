version: "3.8"

services:
  performance-system:
    image: kmu-performance-system:ds916-amd64
    platform: linux/amd64
    container_name: kmu-performance
    restart: unless-stopped
    ports:
      - "${KMP_HOST_PORT:-3100}:3000"
    environment:
      TZ: "${TZ:-Asia/Seoul}"
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-30}"
    volumes:
      - "${KMP_DATA_DIR:-/volume1/docker/kmu-performance/data}:/app/data"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const http=require('http');
          const request=http.get('http://127.0.0.1:3000/dashboard',
          response=>process.exit(response.statusCode<500?0:1));
          request.on('error',()=>process.exit(1));
          setTimeout(()=>process.exit(1),5000);
      interval: 30s
      timeout: 7s
      retries: 3
      start_period: 45s
